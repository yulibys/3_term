<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Chur_menya</title>
    <link rel="stylesheet" href="stylesheets/style.css" />
    <script src="javascripts/scripts.js"></script>
  </head>
  <body>
    <section class="section-1">
      <div class="scene">
        <img
          id="frame"
          class="frame"
          src="images/space/frame_01.png"
          alt="пространство"
        />
        <img class="sect_1" src="images/sect_1.svg" alt="" />
        <div class="overlay">
          <div class="decor">
            <img src="images/decor.svg" alt="" />
          </div>

          <div class="title">
            АГЕНТСТВО ЗНАКОМСТВ<br />
            ДЛЯ СЛАВЯНСКИХ<br />
            СУЩЕСТВ
          </div>

          <div class="counter" id="counter">01/17</div>
        </div>
      </div>
    </section>
    <section class="section-2">
      <div class="letters">
        <div id="text1">ч</div>
        <div id="text2">у</div>
        <div id="text3">р</div>
        <div id="text4">м</div>
        <div id="text5">е</div>
        <div id="text6">н</div>
        <div id="text7">я</div>
        <div id="text8">!</div>
        <div class="apple1"></div>
        <div class="apple2"></div>
        <div class="apple3"></div>
        <div class="apple4"></div>
        <div class="apple5"></div>
        <div class="apple6"></div>
      </div>
    </section>
    <section class="section-3">
      <div class="popup">
        <div id="text9">?</div>
      </div>
    </section>
    <section class="section-4">
      <div class="field4" id="field4"></div>
    </section>
    <section class="section-5" id="section5">
      <div class="line5">
        <div class="track5">
          <span>ВОЛШЕБНОЕ БЛЮДЦЕ • ВОЛШЕБНОЕ БЛЮДЦЕ • ВОЛШЕБНОЕ БЛЮДЦЕ •</span>
          <span>ВОЛШЕБНОЕ БЛЮДЦЕ • ВОЛШЕБНОЕ БЛЮДЦЕ • ВОЛШЕБНОЕ БЛЮДЦЕ •</span>
        </div>
      </div>

      <div class="scene5">
        <img class="plate5" src="images/plate5.svg" alt="" />

        <div class="portal5">
          <video class="video5" id="video5" autoplay playsinline muted></video>
          <canvas class="canvas5" id="canvas5"></canvas>
          <img class="photo5" id="photo5" alt="" />
        </div>

        <button
          class="btn5"
          id="btn5"
          type="button"
          aria-label="Сделать фото"
        ></button>

        <div class="leftgroup5">
          <img class="hand5 handleft5" src="images/hand_left.png" alt="" />
        </div>

        <img class="hand5 handright5" src="images/hand_right.png" alt="" />

        <div class="appleorbit5">
          <img class="appleplate5" src="images/apple5.svg" alt="" />
        </div>
      </div>
    </section>
  </body>
</html>
